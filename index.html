<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>線上課程學習平台</title>
<script src="config.js"></script>
<!--
  ════════════════════════════════════════════
  【使用說明】
  1. 密碼：在 GAS 專案設定 → 指令碼屬性 → SITE_PW 修改（不需動這個檔案）
  2. 新增課程：在 const COURSES 區塊新增對應的 key
     格式：'G{年級}|{科目}|{上/下}'
     例如：'G8|數學|上'  → 國二數學上學期
          'G4|英語|下'  → 小四英語下學期
  3. 年級代碼：G1=小一 G2=小二 G3=小三 G4=小四 G5=小五 G6=小六
              G7=國一 G8=國二 G9=國三
  ════════════════════════════════════════════
-->
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, 'Helvetica Neue', 'Noto Sans TC', sans-serif;
  background: #f0f4f8; color: #1a202c; min-height: 100vh;
}

/* ── LOGIN ── */
#login-screen {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
  background: linear-gradient(135deg, #1a365d 0%, #2b6cb0 55%, #553c9a 100%);
}
.login-box {
  background: #fff; border-radius: 24px; padding: 48px 40px;
  width: min(360px, 90vw); text-align: center;
  box-shadow: 0 24px 64px rgba(0,0,0,.3);
}
.login-logo { font-size: 64px; margin-bottom: 14px; }
.login-box h1 { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
.login-box p  { color: #718096; font-size: 14px; margin-bottom: 28px; }
.login-input {
  width: 100%; padding: 14px 16px;
  border: 2px solid #e2e8f0; border-radius: 12px;
  font-size: 16px; outline: none; transition: border-color .2s;
  font-family: inherit;
}
.login-input:focus { border-color: #2b6cb0; }
.login-btn {
  display: block; width: 100%; margin-top: 14px;
  padding: 14px; border: none; border-radius: 12px;
  background: linear-gradient(135deg, #2b6cb0, #553c9a);
  color: #fff; font-size: 16px; font-weight: 700;
  cursor: pointer; font-family: inherit; transition: opacity .2s;
}
.login-btn:hover { opacity: .88; }
.login-error { color: #e53e3e; font-size: 13px; margin-top: 10px; display: none; }

/* ── APP SHELL ── */
#app { display: none; }

header {
  background: linear-gradient(135deg, #1a365d, #2b6cb0);
  color: #fff; padding: 16px 20px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
header h1 { font-size: 18px; font-weight: 800; }
.logout-btn {
  background: rgba(255,255,255,.18); color: #fff;
  border: 1px solid rgba(255,255,255,.4);
  padding: 7px 16px; border-radius: 8px;
  cursor: pointer; font-size: 13px; font-family: inherit;
  transition: background .2s;
}
.logout-btn:hover { background: rgba(255,255,255,.3); }

/* ── LEVEL TABS ── */
.level-tabs {
  display: flex; background: #fff;
  border-bottom: 2px solid #e2e8f0; padding: 0 16px;
}
.level-tab {
  padding: 13px 24px; font-size: 15px; font-weight: 700;
  color: #718096; background: none;
  border: none; border-bottom: 3px solid transparent;
  margin-bottom: -2px; cursor: pointer; font-family: inherit;
  transition: all .2s;
}
.level-tab.active { color: #2b6cb0; border-bottom-color: #2b6cb0; }

/* ── GRADE BAR ── */
.grade-bar {
  background: #fff; padding: 10px 16px;
  border-bottom: 1px solid #e2e8f0;
  display: flex; gap: 8px; flex-wrap: wrap;
}
.grade-btn {
  padding: 8px 18px; border-radius: 20px;
  border: 2px solid #e2e8f0; background: #f7fafc;
  color: #4a5568; font-size: 14px; font-weight: 700;
  cursor: pointer; font-family: inherit; transition: all .2s;
}
.grade-btn:hover { border-color: #2b6cb0; color: #2b6cb0; background: #ebf8ff; }
.grade-btn.active { background: #2b6cb0; border-color: #2b6cb0; color: #fff; }

/* ── MAIN CONTENT ── */
.main-content { max-width: 980px; margin: 0 auto; padding: 20px 16px 48px; }
.section-title {
  font-size: 15px; font-weight: 700; color: #4a5568;
  margin-bottom: 14px; padding-left: 4px;
}

/* ── SUBJECT GRID ── */
.subject-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
  gap: 14px;
}
.subject-card {
  background: #fff; border-radius: 16px;
  border: 2px solid #e2e8f0; overflow: hidden;
  transition: transform .2s, box-shadow .2s;
}
.subject-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,.1);
}

/* ── SUBJECT HEADER ── */
.subject-hdr {
  display: flex; align-items: center;
  padding: 15px 16px; cursor: pointer; gap: 12px;
  user-select: none;
}
.subject-icon {
  width: 44px; height: 44px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
}
.subject-info { flex: 1; min-width: 0; }
.subject-name { font-size: 16px; font-weight: 800; }
.subject-badges { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 5px; }
.sem-badge {
  font-size: 11px; font-weight: 700;
  padding: 3px 8px; border-radius: 10px;
}
.sem-badge.has  { background: #c6f6d5; color: #22543d; }
.sem-badge.none { background: #edf2f7; color: #a0aec0; }
.subject-arrow { color: #cbd5e0; font-size: 13px; transition: transform .25s; flex-shrink: 0; }
.subject-arrow.open { transform: rotate(180deg); }

/* ── SUBJECT BODY ── */
.subject-body { display: none; border-top: 2px solid #e2e8f0; }
.subject-body.open { display: block; }

/* ── SEM TABS ── */
.sem-tabs { display: flex; border-bottom: 1px solid #e2e8f0; background: #f7fafc; }
.sem-tab {
  padding: 10px 20px; font-size: 13px; font-weight: 700;
  color: #718096; border: none; background: none;
  border-bottom: 3px solid transparent; margin-bottom: -1px;
  cursor: pointer; font-family: inherit; transition: all .15s;
}
.sem-tab.active { color: #2b6cb0; border-bottom-color: #2b6cb0; background: #fff; }

/* ── BONUS BAR ── */
.bonus-bar {
  background: linear-gradient(135deg, #fefce8, #fef9c3);
  border-bottom: 1px solid #fde68a; padding: 12px 14px;
}
.bonus-bar-title { font-size: 11px; font-weight: 800; color: #92400e; margin-bottom: 8px; }
.bonus-links { display: flex; flex-wrap: wrap; gap: 6px; }
.bonus-link {
  background: #fff; border: 1px solid #fbbf24; color: #92400e;
  padding: 5px 12px; border-radius: 14px; font-size: 12px;
  font-weight: 600; text-decoration: none; transition: all .15s;
}
.bonus-link:hover { background: #fef3c7; transform: translateY(-1px); }

/* ── PROGRESS ── */
.progress-wrap {
  padding: 10px 14px; background: #fff;
  border-bottom: 1px solid #f0f4f8;
}
.progress-labels {
  display: flex; justify-content: space-between;
  font-size: 11px; color: #718096; margin-bottom: 5px;
}
.progress-track {
  height: 7px; background: #e2e8f0;
  border-radius: 4px; overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #38a169, #2b6cb0);
  border-radius: 4px; transition: width .5s ease;
}

/* ── CHAPTERS ── */
.chapter-block { border-bottom: 1px solid #f0f4f8; }
.chapter-block:last-child { border-bottom: none; }
.chapter-hdr {
  display: flex; align-items: center;
  padding: 10px 14px; cursor: pointer;
  background: #f7fafc; gap: 9px;
  transition: background .15s;
}
.chapter-hdr:hover { background: #edf2f7; }
.ch-tag {
  font-size: 10px; font-weight: 800;
  padding: 3px 7px; border-radius: 5px;
  background: #2b6cb0; color: #fff; white-space: nowrap;
}
.ch-title { flex: 1; font-size: 13px; font-weight: 700; }
.ch-meta  { font-size: 11px; color: #a0aec0; white-space: nowrap; }
.ch-arrow { color: #cbd5e0; font-size: 11px; transition: transform .2s; }
.ch-arrow.open { transform: rotate(180deg); }
.chapter-videos { display: none; }
.chapter-videos.open { display: block; }

/* ── VIDEO ROW ── */
.video-row {
  display: flex; align-items: center;
  padding: 10px 14px; gap: 9px;
  border-bottom: 1px solid #f0f4f8;
  transition: background .12s;
}
.video-row:last-child { border-bottom: none; }
.video-row:hover { background: #f7fafc; }
.video-row.watched { background: #f0fff4; }
.v-num   { font-size: 10px; color: #a0aec0; font-weight: 700; min-width: 72px; font-family: monospace; }
.v-title { flex: 1; font-size: 13px; line-height: 1.4; }
.v-title.exam { color: #b45309; font-weight: 700; }
.v-dur   { font-size: 11px; color: #a0aec0; white-space: nowrap; min-width: 36px; text-align: right; }
.v-btn {
  padding: 6px 11px; border-radius: 7px;
  background: #2b6cb0; color: #fff;
  text-decoration: none; font-size: 12px; font-weight: 700;
  white-space: nowrap; transition: all .15s; flex-shrink: 0;
}
.v-btn:hover   { background: #2c5282; transform: translateY(-1px); }
.v-btn.exam-btn { background: #d97706; }
.v-btn.exam-btn:hover { background: #b45309; }
.v-check {
  width: 17px; height: 17px; cursor: pointer;
  accent-color: #38a169; flex-shrink: 0;
}

/* ── EMPTY STATE ── */
.empty-state {
  padding: 36px 20px; text-align: center; color: #a0aec0;
}
.empty-icon { font-size: 40px; margin-bottom: 8px; }
.empty-state p { font-size: 13px; }
.empty-state .hint { font-size: 11px; color: #cbd5e0; margin-top: 4px; }

@media (max-width: 600px) {
  .subject-grid { grid-template-columns: 1fr; }
  .v-num { display: none; }
  header h1 { font-size: 15px; }
  .level-tab { padding: 12px 16px; font-size: 14px; }
}
</style>
</head>
<body>

<!-- ════════════ LOGIN ════════════ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">📚</div>
    <h1>線上課程學習平台</h1>
    <p>請輸入帳號與密碼</p>
    <input class="login-input" type="text" id="username"
           placeholder="帳號"
           onkeydown="if(event.key==='Enter')document.getElementById('pw').focus()">
    <input class="login-input" type="password" id="pw"
           placeholder="密碼"
           style="margin-top:10px"
           onkeydown="if(event.key==='Enter')login()">
    <button class="login-btn" id="login-btn" onclick="login()">進入課程 →</button>
    <p class="login-error" id="login-error">❌ 帳號或密碼錯誤</p>
  </div>
</div>

<!-- ════════════ APP ════════════ -->
<div id="app">
  <header>
    <h1>📚 線上課程學習平台</h1>
    <div style="display:flex;align-items:center;gap:12px">
      <span id="user-label" style="font-size:14px;opacity:.85"></span>
      <button class="logout-btn" onclick="logout()">登出</button>
    </div>
  </header>

  <div class="level-tabs">
    <button class="level-tab active" id="tab-elem" onclick="setLevel('elem')">🏫 國小課程</button>
    <button class="level-tab"        id="tab-jh"   onclick="setLevel('jh')">🏫 國中課程</button>
  </div>

  <div class="grade-bar" id="grade-bar"></div>

  <div class="main-content">
    <p class="section-title" id="section-title"></p>
    <div class="subject-grid" id="subject-grid"></div>
  </div>
</div>

<script>
// 密碼儲存在 GAS 指令碼屬性（SITE_PW），不在這裡

// ── 科目外觀設定 ─────────────────────────────

// ════════════════════════════════════════════
//  以下為程式邏輯，一般不需要修改
// ════════════════════════════════════════════

const SESS_KEY = 'lms_auth';

let currentUser   = '';
let currentLevel  = 'elem';
let currentGrade  = 'G1';
let openSubject   = null;
let openSem       = null;

function watchedKey() { return 'lms_watched_' + currentUser; }

// ── AUTH ─────────────────────────────────────
function login() {
  const user = document.getElementById('username').value.trim();
  const pw   = document.getElementById('pw').value.trim();
  const btn  = document.getElementById('login-btn');
  if (!user || !pw) { showLoginError('⚠️ 請輸入帳號與密碼'); return; }

  if (!GAS_URL || GAS_URL.includes('YOUR_DEPLOYMENT_ID')) {
    showLoginError('⚠️ 請先設定 config.js 的 GAS 網址'); return;
  }

  btn.textContent = '驗證中…'; btn.disabled = true;
  document.getElementById('login-error').style.display = 'none';

  const cbName = '_cb' + Date.now();
  const timer  = setTimeout(() => {
    cleanup(); showLoginError('⚠️ 連線逾時，請稍後再試');
  }, 12000);

  function cleanup() {
    clearTimeout(timer); delete window[cbName];
    const s = document.getElementById('_gas_script');
    if (s) s.remove();
    btn.textContent = '進入課程 →'; btn.disabled = false;
  }

  window[cbName] = function(data) {
    cleanup();
    if (data && data.ok) {
      currentUser = data.user;
      sessionStorage.setItem(SESS_KEY, data.user);
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      document.getElementById('user-label').textContent = '👤 ' + data.user;
      initApp();
    } else {
      showLoginError('❌ 帳號或密碼錯誤');
      document.getElementById('pw').value = '';
      document.getElementById('pw').focus();
    }
  };

  const script   = document.createElement('script');
  script.id      = '_gas_script';
  script.onerror = function() {
    cleanup(); showLoginError('⚠️ 連線失敗，請確認網路或 GAS 網址是否正確');
  };
  script.src = GAS_URL
    + '?action=checkLogin'
    + '&user=' + encodeURIComponent(user)
    + '&pw='   + encodeURIComponent(pw)
    + '&cb='   + cbName;
  document.head.appendChild(script);
}

function showLoginError(msg) {
  const err = document.getElementById('login-error');
  err.textContent = msg; err.style.display = 'block';
}

function logout() {
  sessionStorage.removeItem(SESS_KEY);
  location.reload();
}

// ── WATCHED ──────────────────────────────────
function getWatched() {
  try { return JSON.parse(localStorage.getItem(watchedKey())) || {}; }
  catch(e) { return {}; }
}
function toggleWatched(vid) {
  const w = getWatched();
  w[vid] = !w[vid];
  localStorage.setItem(watchedKey(), JSON.stringify(w));
  const row = document.getElementById('vr-' + vid);
  if (row) row.className = 'video-row' + (w[vid] ? ' watched' : '');
  updateProgressBar(vid, w);
}
function updateProgressBar(vid, w) {
  for (const [key, data] of Object.entries(COURSES)) {
    for (const ch of data.chapters) {
      if (ch.videos.some(v => v.id === vid)) {
        const all  = data.chapters.flatMap(c => c.videos);
        const done = all.filter(v => w[v.id]).length;
        const pct  = Math.round(done / all.length * 100);
        const fill = document.getElementById('pf-' + key.replace(/\|/g,'-'));
        const lbl  = document.getElementById('pl-' + key.replace(/\|/g,'-'));
        if (fill) fill.style.width = pct + '%';
        if (lbl)  lbl.textContent  = `${done} / ${all.length} 支（${pct}%）`;
        return;
      }
    }
  }
}

// ── LEVEL / GRADE ────────────────────────────
function setLevel(lv) {
  currentLevel = lv; openSubject = null; openSem = null;
  document.getElementById('tab-elem').classList.toggle('active', lv === 'elem');
  document.getElementById('tab-jh').classList.toggle('active',   lv === 'jh');
  currentGrade = GRADES.find(g => g.level === lv).id;
  renderGrades();
  renderSubjects();
}
function setGrade(gid) {
  currentGrade = gid; openSubject = null; openSem = null;
  document.querySelectorAll('.grade-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.gid === gid));
  renderSubjects();
}

// ── RENDER GRADES ────────────────────────────
function renderGrades() {
  document.getElementById('grade-bar').innerHTML =
    GRADES.filter(g => g.level === currentLevel).map(g =>
      `<button class="grade-btn${g.id === currentGrade ? ' active' : ''}"
               data-gid="${g.id}" onclick="setGrade('${g.id}')">${g.label}</button>`
    ).join('');
}

// ── RENDER SUBJECTS ──────────────────────────
function renderSubjects() {
  const grade = GRADES.find(g => g.id === currentGrade);
  document.getElementById('section-title').textContent = `${grade.full} ・ 考科課程`;

  document.getElementById('subject-grid').innerHTML = grade.subs.map(sub => {
    const cfg    = SUB_CFG[sub] || { icon:'📚', c:'#4a5568', bg:'#f7fafc' };
    const upKey  = `${currentGrade}|${sub}|上`;
    const dnKey  = `${currentGrade}|${sub}|下`;
    const upData = COURSES[upKey];
    const dnData = COURSES[dnKey];

    const badges = ['上','下'].map(sem => {
      const d   = sem === '上' ? upData : dnData;
      const cnt = d ? d.chapters.reduce((s,c) => s + c.videos.length, 0) : 0;
      return `<span class="sem-badge ${d ? 'has' : 'none'}">
        ${sem}學期${d ? ` · ${cnt}支` : ''}
      </span>`;
    }).join('');

    const isOpen = openSubject === sub;
    return `
      <div class="subject-card" style="border-color:${cfg.c}40"
           id="sc-${currentGrade}-${sub}">
        <div class="subject-hdr"
             onclick="toggleSubject('${currentGrade}','${sub}','${cfg.c}')">
          <div class="subject-icon" style="background:${cfg.bg}">${cfg.icon}</div>
          <div class="subject-info">
            <div class="subject-name" style="color:${cfg.c}">${sub}</div>
            <div class="subject-badges">${badges}</div>
          </div>
          <span class="subject-arrow${isOpen ? ' open' : ''}"
                id="sa-${currentGrade}-${sub}">▼</span>
        </div>
        <div class="subject-body${isOpen ? ' open' : ''}"
             id="sb-${currentGrade}-${sub}">
          ${isOpen ? buildSubjectBody(currentGrade, sub) : ''}
        </div>
      </div>`;
  }).join('');
}

// ── TOGGLE SUBJECT ───────────────────────────
function toggleSubject(gid, sub) {
  if (openSubject === sub) {
    openSubject = null; openSem = null;
  } else {
    openSubject = sub;
    openSem = COURSES[`${gid}|${sub}|上`] ? '上' : '下';
  }
  const body  = document.getElementById(`sb-${gid}-${sub}`);
  const arrow = document.getElementById(`sa-${gid}-${sub}`);
  if (openSubject === sub) {
    body.innerHTML = buildSubjectBody(gid, sub);
    body.classList.add('open');
    arrow.classList.add('open');
  } else {
    body.classList.remove('open');
    arrow.classList.remove('open');
  }
}

// ── BUILD SUBJECT BODY ───────────────────────
function buildSubjectBody(gid, sub) {
  const upData = COURSES[`${gid}|${sub}|上`];
  const dnData = COURSES[`${gid}|${sub}|下`];
  if (!upData && !dnData)
    return `<div class="empty-state">
      <div class="empty-icon">📭</div>
      <p>尚未加入課程</p>
      <p class="hint">購買課程後請告知家長新增</p>
    </div>`;

  const sems = [
    { key:'上', data: upData },
    { key:'下', data: dnData },
  ].filter(s => s.data);
  if (!openSem || !sems.find(s => s.key === openSem)) openSem = sems[0].key;
  const curData = COURSES[`${gid}|${sub}|${openSem}`];

  const tabs = sems.map(s =>
    `<button class="sem-tab${s.key === openSem ? ' active' : ''}"
             onclick="setSem('${gid}','${sub}','${s.key}')">${s.key}學期</button>`
  ).join('');

  return `<div class="sem-tabs">${tabs}</div>${buildSemContent(gid, sub, openSem, curData)}`;
}

// ── SET SEMESTER ─────────────────────────────
function setSem(gid, sub, sem) {
  openSem = sem;
  const body = document.getElementById(`sb-${gid}-${sub}`);
  if (body) body.innerHTML = buildSubjectBody(gid, sub);
}

// ── BUILD SEM CONTENT ────────────────────────
function buildSemContent(gid, sub, sem, data) {
  if (!data)
    return `<div class="empty-state">
      <div class="empty-icon">📭</div><p>尚未加入課程</p>
    </div>`;

  const w   = getWatched();
  const all = data.chapters.flatMap(c => c.videos);
  const done= all.filter(v => w[v.id]).length;
  const pct = all.length ? Math.round(done / all.length * 100) : 0;
  const pid = `${gid}-${sub}-${sem}`;

  const bonusHtml = data.bonus ? `
    <div class="bonus-bar">
      <div class="bonus-bar-title">🌟 延伸學習資源</div>
      <div class="bonus-links">
        ${data.bonus.map(b =>
          `<a href="${b.url}" target="_blank" class="bonus-link">▶ ${b.label}</a>`
        ).join('')}
      </div>
    </div>` : '';

  const chapters = data.chapters.map(ch => {
    const totalMins = ch.videos.reduce((s,v)=>s+v.mins,0);
    const wCnt      = ch.videos.filter(v=>w[v.id]).length;
    const videos    = ch.videos.map(v => `
      <div class="video-row${w[v.id]?' watched':''}" id="vr-${v.id}">
        <span class="v-num">${v.id}</span>
        <span class="v-title${v.isExam?' exam':''}">
          ${v.isExam ? '📝 ' : ''}${v.title}
        </span>
        <span class="v-dur">${fmtMins(v.mins)}</span>
        <a href="${v.url}" target="_blank"
           class="v-btn${v.isExam?' exam-btn':''}">▶ 觀看</a>
        <input type="checkbox" class="v-check" title="標記已看"
               ${w[v.id]?'checked':''} onchange="toggleWatched('${v.id}')">
      </div>`).join('');
    return `
      <div class="chapter-block">
        <div class="chapter-hdr" onclick="toggleCh(this)">
          <span class="ch-tag">${ch.id}</span>
          <span class="ch-title">${ch.title}</span>
          <span class="ch-meta">${ch.videos.length}支 · ${fmtMins(totalMins)}${wCnt?` · ✓${wCnt}`:''}</span>
          <span class="ch-arrow open">▼</span>
        </div>
        <div class="chapter-videos open">${videos}</div>
      </div>`;
  }).join('');

  return `
    ${bonusHtml}
    <div class="progress-wrap">
      <div class="progress-labels">
        <span>學習進度</span>
        <span id="pl-${pid}">${done} / ${all.length} 支（${pct}%）</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="pf-${pid}" style="width:${pct}%"></div>
      </div>
    </div>
    ${chapters}`;
}

// ── TOGGLE CHAPTER ───────────────────────────
function toggleCh(hdr) {
  const body = hdr.nextElementSibling;
  const arr  = hdr.querySelector('.ch-arrow');
  const open = body.classList.toggle('open');
  arr.classList.toggle('open', open);
}

// ── HELPERS ──────────────────────────────────
function fmtMins(m) {
  if (m < 60) return m + '分';
  return Math.floor(m/60) + '時' + (m % 60 ? (m % 60) + '分' : '');
}

// ── INIT ─────────────────────────────────────
function initApp() {
  setLevel('elem');
}

document.getElementById('pw').addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});

const _savedUser = sessionStorage.getItem(SESS_KEY);
if (_savedUser) {
  currentUser = _savedUser;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('user-label').textContent = '👤 ' + _savedUser;
  initApp();
}
</script>

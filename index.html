<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>線上課程學習平台</title>
<script src="config.js"></script>
<!--
  ════════════════════════════════════════════
  【使用說明】
  1. 密碼：帳號密碼在 Google Sheets「帳號」工作表管理（不需動這個檔案）
  2. 新增課程：在 const COURSES 區塊新增對應的 key
     格式：'G{年級}|{科目}|{上/下}'
     例如：'G8|數學|上'  → 國二數學上學期
          'G4|英語|下'  → 小四英語下學期
  3. 年級代碼：G1=小一 G2=小二 G3=小三 G4=小四 G5=小五 G6=小六
              G7=國一 G8=國二 G9=國三
  4. 課程觀看權限：在「帳號」工作表 D欄「允許課程」設定，
     填 * 開放全部、留空完全看不到、或填 G8 / G8|理化 / G8|理化|上
     等規則指定部分開放（詳見 gas-password-api.gs 開頭說明）
  ════════════════════════════════════════════
-->
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, 'Helvetica Neue', 'Noto Sans TC', sans-serif;
  background: #f0f4f8; color: #1a202c; min-height: 100vh;
}

/* ── LOGIN ── */
#login-screen {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
  background: linear-gradient(135deg, #1a365d 0%, #2b6cb0 55%, #553c9a 100%);
}
.login-box {
  background: #fff; border-radius: 24px; padding: 48px 40px;
  width: min(360px, 90vw); text-align: center;
  box-shadow: 0 24px 64px rgba(0,0,0,.3);
}
.login-logo { font-size: 64px; margin-bottom: 14px; }
.login-box h1 { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
.login-box p  { color: #718096; font-size: 14px; margin-bottom: 28px; }
.login-input {
  width: 100%; padding: 14px 16px;
  border: 2px solid #e2e8f0; border-radius: 12px;
  font-size: 16px; outline: none; transition: border-color .2s;
  font-family: inherit;
}
.login-input:focus { border-color: #2b6cb0; }
.login-btn {
  display: block; width: 100%; margin-top: 14px;
  padding: 14px; border: none; border-radius: 12px;
  background: linear-gradient(135deg, #2b6cb0, #553c9a);
  color: #fff; font-size: 16px; font-weight: 700;
  cursor: pointer; font-family: inherit; transition: opacity .2s;
}
.login-btn:hover { opacity: .88; }
.login-error { color: #e53e3e; font-size: 13px; margin-top: 10px; display: none; }

/* ── APP SHELL ── */
#app { display: none; }

header {
  background: linear-gradient(135deg, #1a365d, #2b6cb0);
  color: #fff; padding: 16px 20px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
header h1 { font-size: 18px; font-weight: 800; }
.logout-btn {
  background: rgba(255,255,255,.18); color: #fff;
  border: 1px solid rgba(255,255,255,.4);
  padding: 7px 16px; border-radius: 8px;
  cursor: pointer; font-size: 13px; font-family: inherit;
  transition: background .2s;
}
.logout-btn:hover { background: rgba(255,255,255,.3); }

/* ── LEVEL TABS ── */
.level-tabs {
  display: flex; background: #fff;
  border-bottom: 2px solid #e2e8f0; padding: 0 16px;
}
.level-tab {
  padding: 13px 24px; font-size: 15px; font-weight: 700;
  color: #718096; background: none;
  border: none; border-bottom: 3px solid transparent;
  margin-bottom: -2px; cursor: pointer; font-family: inherit;
  transition: all .2s;
}
.level-tab.active { color: #2b6cb0; border-bottom-color: #2b6cb0; }

/* ── GRADE BAR ── */
.grade-bar {
  background: #fff; padding: 10px 16px;
  border-bottom: 1px solid #e2e8f0;
  display: flex; gap: 8px; flex-wrap: wrap;
}
.grade-btn {
  padding: 8px 18px; border-radius: 20px;
  border: 2px solid #e2e8f0; background: #f7fafc;
  color: #4a5568; font-size: 14px; font-weight: 700;
  cursor: pointer; font-family: inherit; transition: all .2s;
}
.grade-btn:hover { border-color: #2b6cb0; color: #2b6cb0; background: #ebf8ff; }
.grade-btn.active { background: #2b6cb0; border-color: #2b6cb0; color: #fff; }

/* ── MAIN CONTENT ── */
.main-content { max-width: 980px; margin: 0 auto; padding: 20px 16px 48px; transition: max-width .2s; }
.main-content.theater-mode { max-width: 1360px; }
.section-title {
  font-size: 15px; font-weight: 700; color: #4a5568;
  margin-bottom: 14px; padding-left: 4px;
}

/* ── CONTENT SPLIT (nav + theater) ── */
.content-split { display: flex; gap: 20px; align-items: flex-start; }
.content-split .subject-grid { flex: 1; }
.content-split.is-theater .subject-grid {
  flex: 0 0 360px; max-width: 360px;
  grid-template-columns: 1fr;
}
.theater-wrap {
  display: none; flex: 1; min-width: 0;
  position: sticky; top: 78px;
}
.theater-wrap.active { display: block; }
.theater-panel {
  position: relative; width: 100%; padding-top: 56.25%;
  background: #000; border-radius: 14px; overflow: hidden;
  box-shadow: 0 8px 28px rgba(0,0,0,.18);
}
.theater-panel.is-pdf { padding-top: 130%; background: #f7fafc; }
.theater-panel.is-page { padding-top: 0; height: 80vh; background: #f0f4f8; }
.theater-panel.is-text {
  padding-top: 0; height: auto; background: #fff;
  padding: 24px; font-size: 14px; line-height: 1.9; color: #2d3748;
  white-space: pre-line;
}
.theater-panel iframe {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;
}
.theater-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 8px;
}
.theater-title { font-size: 14px; font-weight: 700; color: #2d3748; }
.theater-close {
  background: #edf2f7; border: none; border-radius: 7px;
  padding: 5px 12px; font-size: 12px; color: #4a5568; cursor: pointer;
}
.theater-close:hover { background: #e2e8f0; }

/* ── SUBJECT GRID ── */
.subject-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
  gap: 14px;
}
.subject-card {
  background: #fff; border-radius: 16px;
  border: 2px solid #e2e8f0; overflow: hidden;
  transition: transform .2s, box-shadow .2s;
}
.subject-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,.1);
}

/* ── SUBJECT HEADER ── */
.subject-hdr {
  display: flex; align-items: center;
  padding: 15px 16px; cursor: pointer; gap: 12px;
  user-select: none;
}
.subject-icon {
  width: 44px; height: 44px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
}
.subject-info { flex: 1; min-width: 0; }
.subject-name { font-size: 16px; font-weight: 800; }
.subject-badges { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 5px; }
.sem-badge {
  font-size: 11px; font-weight: 700;
  padding: 3px 8px; border-radius: 10px;
}
.sem-badge.has  { background: #c6f6d5; color: #22543d; }
.sem-badge.none { background: #edf2f7; color: #a0aec0; }
.subject-arrow { color: #cbd5e0; font-size: 13px; transition: transform .25s; flex-shrink: 0; }
.subject-arrow.open { transform: rotate(180deg); }

/* ── SUBJECT BODY ── */
.subject-body { display: none; border-top: 2px solid #e2e8f0; }
.subject-body.open { display: block; }

/* ── SEM TABS ── */
.sem-tabs { display: flex; border-bottom: 1px solid #e2e8f0; background: #f7fafc; }
.sem-tab {
  padding: 10px 20px; font-size: 13px; font-weight: 700;
  color: #718096; border: none; background: none;
  border-bottom: 3px solid transparent; margin-bottom: -1px;
  cursor: pointer; font-family: inherit; transition: all .15s;
}
.sem-tab.active { color: #2b6cb0; border-bottom-color: #2b6cb0; background: #fff; }

/* ── BONUS BAR ── */
.bonus-bar {
  background: linear-gradient(135deg, #fefce8, #fef9c3);
  border-bottom: 1px solid #fde68a; padding: 12px 14px;
}
.bonus-bar-title { font-size: 11px; font-weight: 800; color: #92400e; margin-bottom: 8px; }
.bonus-links { display: flex; flex-wrap: wrap; gap: 6px; }
.bonus-link {
  background: #fff; border: 1px solid #fbbf24; color: #92400e;
  padding: 5px 12px; border-radius: 14px; font-size: 12px;
  font-weight: 600; text-decoration: none; transition: all .15s;
}
.bonus-link:hover { background: #fef3c7; transform: translateY(-1px); }

/* ── PROGRESS ── */
.progress-wrap {
  padding: 10px 14px; background: #fff;
  border-bottom: 1px solid #f0f4f8;
}
.progress-labels {
  display: flex; justify-content: space-between;
  font-size: 11px; color: #718096; margin-bottom: 5px;
}
.progress-track {
  height: 7px; background: #e2e8f0;
  border-radius: 4px; overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #38a169, #2b6cb0);
  border-radius: 4px; transition: width .5s ease;
}

/* ── CHAPTERS ── */
.chapter-block { border-bottom: 1px solid #f0f4f8; }
.chapter-block:last-child { border-bottom: none; }
.chapter-hdr {
  display: flex; align-items: center;
  padding: 10px 14px; cursor: pointer;
  background: #f7fafc; gap: 9px;
  transition: background .15s;
}
.chapter-hdr:hover { background: #edf2f7; }
.ch-tag {
  font-size: 10px; font-weight: 800;
  padding: 3px 7px; border-radius: 5px;
  background: #2b6cb0; color: #fff; white-space: nowrap;
}
.ch-title { flex: 1; font-size: 13px; font-weight: 700; }
.ch-meta  { font-size: 11px; color: #a0aec0; white-space: nowrap; }
.ch-arrow { color: #cbd5e0; font-size: 11px; transition: transform .2s; }
.ch-arrow.open { transform: rotate(180deg); }
.chapter-videos { display: none; }
.chapter-videos.open { display: block; }

/* ── VIDEO ROW ── */
.video-row {
  display: flex; align-items: center;
  padding: 10px 14px; gap: 9px;
  border-bottom: 1px solid #f0f4f8;
  transition: background .12s;
}
.video-row:last-child { border-bottom: none; }
.video-row:hover { background: #f7fafc; }
.video-row.watched { background: #f0fff4; }
.v-num   { font-size: 10px; color: #a0aec0; font-weight: 700; min-width: 72px; font-family: monospace; }
.v-title { flex: 1; font-size: 13px; line-height: 1.4; }
.v-title.exam { color: #b45309; font-weight: 700; }
.v-dur   { font-size: 11px; color: #a0aec0; white-space: nowrap; min-width: 36px; text-align: right; }
.v-btn {
  padding: 6px 11px; border-radius: 7px;
  background: #2b6cb0; color: #fff;
  text-decoration: none; font-size: 12px; font-weight: 700;
  white-space: nowrap; transition: all .15s; flex-shrink: 0;
}
.v-btn:hover   { background: #2c5282; transform: translateY(-1px); }
.v-btn.exam-btn { background: #d97706; }
.v-btn.exam-btn:hover { background: #b45309; }
.v-check {
  width: 17px; height: 17px; cursor: pointer;
  accent-color: #38a169; flex-shrink: 0;
}

.v-btn.playing { background: #38a169; }
.v-btn.playing:hover { background: #2f855a; }

/* ── EMPTY STATE ── */
.empty-state {
  padding: 36px 20px; text-align: center; color: #a0aec0;
}
.empty-icon { font-size: 40px; margin-bottom: 8px; }
.empty-state p { font-size: 13px; }
.empty-state .hint { font-size: 11px; color: #cbd5e0; margin-top: 4px; }

@media (max-width: 600px) {
  .subject-grid { grid-template-columns: 1fr; }
  .v-num { display: none; }
  header h1 { font-size: 15px; }
  .level-tab { padding: 12px 16px; font-size: 14px; }
}

@media (max-width: 860px) {
  .content-split { flex-direction: column; }
  .content-split.is-theater .subject-grid {
    flex: 1 1 auto; max-width: none;
    grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
  }
  .theater-wrap { position: static; }
}
</style>
</head>
<body>

<!-- ════════════ LOGIN ════════════ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">📚</div>
    <h1>線上課程學習平台</h1>
    <p>請輸入帳號與密碼</p>
    <input class="login-input" type="text" id="username"
           placeholder="帳號"
           onkeydown="if(event.key==='Enter')document.getElementById('pw').focus()">
    <input class="login-input" type="password" id="pw"
           placeholder="密碼"
           style="margin-top:10px"
           onkeydown="if(event.key==='Enter')login()">
    <button class="login-btn" id="login-btn" onclick="login()">進入課程 →</button>
    <p class="login-error" id="login-error">❌ 帳號或密碼錯誤</p>
  </div>
</div>

<!-- ════════════ APP ════════════ -->
<div id="app">
  <header>
    <h1>📚 線上課程學習平台</h1>
    <div style="display:flex;align-items:center;gap:12px">
      <span id="user-label" style="font-size:14px;opacity:.85"></span>
      <button class="logout-btn" onclick="logout()">登出</button>
    </div>
  </header>

  <div class="level-tabs">
    <button class="level-tab active" id="tab-elem"  onclick="setLevel('elem')">🏫 國小課程</button>
    <button class="level-tab"        id="tab-jh"    onclick="setLevel('jh')">🏫 國中課程</button>
    <button class="level-tab"        id="tab-extra" onclick="setLevel('extra')">📖 加映課程</button>
  </div>

  <div class="grade-bar" id="grade-bar"></div>

  <div class="main-content" id="main-content">
    <p class="section-title" id="section-title"></p>
    <div class="content-split" id="content-split">
      <div class="subject-grid" id="subject-grid"></div>
      <div class="theater-wrap" id="theater-wrap">
        <div class="theater-head">
          <span class="theater-title" id="theater-title"></span>
          <button class="theater-close" onclick="closeTheater()">✕ 關閉播放</button>
        </div>
        <div class="theater-panel" id="theater-panel"></div>
      </div>
    </div>
  </div>
</div>

<script>
// 密碼儲存在 GAS 指令碼屬性（SITE_PW），不在這裡

// ── 科目外觀設定 ─────────────────────────────
const SUB_CFG = {
  '國語':     { icon:'📖', c:'#c53030', bg:'#fff5f5' },
  '國文':     { icon:'📖', c:'#c53030', bg:'#fff5f5' },
  '數學':     { icon:'🔢', c:'#2b6cb0', bg:'#ebf8ff' },
  '英語':     { icon:'🔤', c:'#6b46c1', bg:'#faf5ff' },
  '生活':     { icon:'🌈', c:'#319795', bg:'#e6fffa' },
  '自然':     { icon:'🔬', c:'#276749', bg:'#f0fff4' },
  '社會':     { icon:'🏛️', c:'#c05621', bg:'#fffaf0' },
  '理化':     { icon:'⚗️', c:'#276749', bg:'#f0fff4' },
  '生物':     { icon:'🌿', c:'#2d6a4f', bg:'#ecfdf5' },
  '地球科學': { icon:'🌏', c:'#1d6a8a', bg:'#ecfeff' },
  '歷史':     { icon:'📜', c:'#744210', bg:'#fffbeb' },
  '地理':     { icon:'🗺️', c:'#2c7a7b', bg:'#f0fdfa' },
  '公民':     { icon:'⚖️', c:'#553c9a', bg:'#f5f3ff' },
};

// ── 年級設定 ─────────────────────────────────
const GRADES = [
  { id:'G5', label:'小五', full:'小學五年級', level:'elem', subs:['國語','英語','數學','自然','社會'] },
  { id:'G6', label:'小六', full:'小學六年級', level:'elem', subs:['國語','英語','數學','自然','社會'] },
  { id:'G7', label:'國一', full:'國中一年級', level:'jh',   subs:['國文','數學','英語','生物','歷史','地理','公民'] },
  { id:'G8', label:'國二', full:'國中二年級', level:'jh',   subs:['國文','數學','英語','理化','地球科學','歷史','地理','公民'] },
  { id:'G9', label:'國三', full:'國中三年級', level:'jh',   subs:['國文','數學','英語','理化','地球科學','歷史','地理','公民'] },
  { id:'X1', label:'不分年級', full:'不分年級加映課程', level:'extra', subs:['國文'] },
];

// ════════════════════════════════════════════
//  課程資料
//  Key 格式：'G{年級}|{科目}|{上/下}'
//  例如：'G8|理化|上'  → 國二理化上學期
//        'G4|數學|下'  → 小四數學下學期
//
//  每個值的結構：
//  {
//    bonus: [{ label, url }, ...],  ← 選填，延伸資源
//    chapters: [
//      {
//        id, title,
//        videos: [{ id, title, url, mins, isExam? }, ...]
//      }
//    ]
//  }
// ════════════════════════════════════════════
const COURSES = {

  // ── 國二 理化 上學期（川楓老師 B3） ──────────
  'G8|理化|上': {
    teacher: '劉川楓老師',
    bonus: [
      { label:'升國二暑假先修安排',     url:'https://youtu.be/-0Xcv3FYn_A' },
      { label:'升國三自然科準備策略',   url:'https://youtu.be/3EdVsI4M6HE' },
      { label:'考高分效率讀書法',       url:'https://youtu.be/R1YgKvQRArk' },
    ],
    chapters: [
      { id:'B3C1', title:'第一章：實驗安全與測量', videos:[
        { id:'B3C1-1',  title:'實驗安全與設計',   url:'https://youtu.be/kQn2Nm0hrCM', mins:57  },
        { id:'B3C1-2',  title:'長度與體積的測量', url:'https://youtu.be/8_2rn5JM3g4', mins:65  },
        { id:'B3C1-3',  title:'質量的測量',       url:'https://youtu.be/Sfot4hVt-js', mins:29  },
        { id:'B3C1-4',  title:'物質的密度',       url:'https://youtu.be/4lX46_s7JFk', mins:102 },
        { id:'B3C1-ex', title:'歷屆會考試題解析', url:'https://youtu.be/1axQuntMKwk', mins:36, isExam:true },
      ]},
      { id:'B3C2', title:'第二章：物質的世界', videos:[
        { id:'B3C2-1',  title:'認識物質',         url:'https://youtu.be/aEEd5MhLTD0', mins:67  },
        { id:'B3C2-2',  title:'水溶液及濃度',     url:'https://youtu.be/CKNPXo9l-qI', mins:108 },
        { id:'B3C2-3',  title:'空氣',             url:'https://youtu.be/ujNU9HoXCTo', mins:46  },
        { id:'B3C2-ex', title:'歷屆會考試題解析', url:'https://youtu.be/VLEKzTyRRU4', mins:50, isExam:true },
      ]},
      { id:'B3C3', title:'第三章：聲音與波', videos:[
        { id:'B3C3-1',  title:'波的傳播',         url:'https://youtu.be/JAxyGBJsLgk', mins:69 },
        { id:'B3C3-2',  title:'聲音的傳播',       url:'https://youtu.be/tkVgG1MTOq4', mins:32 },
        { id:'B3C3-3',  title:'聲波反射與超聲波', url:'https://youtu.be/Wi8dzz8gus8', mins:45 },
        { id:'B3C3-4',  title:'多變的聲音',       url:'https://youtu.be/TJ2VwVVt-Z8', mins:41 },
        { id:'B3C3-ex', title:'歷屆會考試題解析', url:'https://youtu.be/YD1hRwiQ_uI', mins:44, isExam:true },
      ]},
      { id:'B3C4', title:'第四章：光與光學', videos:[
        { id:'B3C4-1',  title:'光的直進',         url:'https://youtu.be/jvIys5anwVE', mins:40 },
        { id:'B3C4-2',  title:'光的反射與面鏡',   url:'https://youtu.be/zu5hKsIMu60', mins:54 },
        { id:'B3C4-3',  title:'光的折射原理',     url:'https://youtu.be/8hC094znZxM', mins:43 },
        { id:'B3C4-4',  title:'透鏡的折射',       url:'https://youtu.be/KgBH4eGxY4Y', mins:74 },

const SESS_KEY    = 'lms_auth';
const ALLOWED_KEY = 'lms_allowed';

let currentUser     = '';
let currentLevel    = 'elem';
let currentGrade    = 'G1';
let openSubject     = null;
let openSem         = null;
let allowedPatterns = [];

function watchedKey() { return 'lms_watched_' + currentUser; }

// ── 課程觀看權限 ──────────────────────────────
// allowedPatterns 內含 '*' → 全部開放；否則逐一比對前綴規則
// 例如規則 'G8' 會開放 'G8|理化|上'；規則 'G8|理化' 會開放上下學期
function setAllowedFromString(str) {
  allowedPatterns = String(str || '').split(',').map(s => s.trim()).filter(Boolean);
}
function isAllowed(key) {
  if (allowedPatterns.includes('*')) return true;
  return allowedPatterns.some(p => key === p || key.startsWith(p + '|'));
}
function courseFor(key) {
  return isAllowed(key) ? COURSES[key] : undefined;
}

// ── JSONP 共用呼叫 ────────────────────────────
function callGAS(params, callback) {
  const cbName = '_cb' + Date.now() + Math.random().toString(36).slice(2, 6);
  const sid    = '_gs_' + cbName;
  const timer  = setTimeout(() => {
    delete window[cbName];
    const s = document.getElementById(sid); if (s) s.remove();
    callback(null);
  }, 15000);

  window[cbName] = function(data) {
    clearTimeout(timer); delete window[cbName];
    const s = document.getElementById(sid); if (s) s.remove();
    callback(data);
  };

  const qs = Object.entries({ ...params, cb: cbName })
    .map(([k, v]) => k + '=' + encodeURIComponent(v)).join('&');
  const s  = document.createElement('script');
  s.id     = sid;
  s.onerror = () => { clearTimeout(timer); delete window[cbName]; callback(null); };
  s.src    = GAS_URL + '?' + qs;
  document.head.appendChild(s);
}

// ── AUTH ─────────────────────────────────────
function login() {
  const user = document.getElementById('username').value.trim();
  const pw   = document.getElementById('pw').value.trim();
  const btn  = document.getElementById('login-btn');
  if (!user || !pw) { showLoginError('⚠️ 請輸入帳號與密碼'); return; }
  if (!GAS_URL || GAS_URL.includes('YOUR_DEPLOYMENT_ID')) {
    showLoginError('⚠️ 請先設定 config.js 的 GAS 網址'); return;
  }

  btn.textContent = '驗證中…'; btn.disabled = true;
  document.getElementById('login-error').style.display = 'none';

  callGAS({ action: 'checkLogin', user, pw }, function(data) {
    if (!data || !data.ok) {
      btn.textContent = '進入課程 →'; btn.disabled = false;
      showLoginError(data ? '❌ 帳號或密碼錯誤' : '⚠️ 連線逾時，請稍後再試');
      document.getElementById('pw').value = '';
      document.getElementById('pw').focus();
      return;
    }
    currentUser = data.user;
    setAllowedFromString(data.allowed);
    btn.textContent = '載入進度…';

    // 登入成功後從雲端載入進度
    callGAS({ action: 'loadProgress', user: currentUser }, function(prog) {
      if (prog && prog.watched) {
        const obj = {};
        prog.watched.split(',').filter(Boolean).forEach(id => obj[id] = true);
        localStorage.setItem(watchedKey(), JSON.stringify(obj));
      }
      sessionStorage.setItem(SESS_KEY, currentUser);
      sessionStorage.setItem(ALLOWED_KEY, data.allowed || '');
      sessionStorage.setItem('lms_grade', data.defaultGrade || 'G8');
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      document.getElementById('user-label').textContent = '👤 ' + currentUser;
      btn.textContent = '進入課程 →'; btn.disabled = false;
      initApp();
    });
  });
}

function showLoginError(msg) {
  const err = document.getElementById('login-error');
  err.textContent = msg; err.style.display = 'block';
}

function logout() {
  sessionStorage.removeItem(SESS_KEY);
  sessionStorage.removeItem(ALLOWED_KEY);
  sessionStorage.removeItem('lms_grade');
  location.reload();
}

// ── WATCHED ──────────────────────────────────
function getWatched() {
  try { return JSON.parse(localStorage.getItem(watchedKey())) || {}; }
  catch(e) { return {}; }
}

let _saveTimer = null;
function scheduleCloudSave() {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(function() {
    if (!currentUser) return;
    const w       = getWatched();
    // 按課程鍵分組，讓試算表每列只存一門課
    const grouped = {};
    for (const [courseKey, courseData] of Object.entries(COURSES)) {
      if (!isAllowed(courseKey)) continue;
      const ids = courseData.chapters
        .flatMap(c => c.videos)
        .filter(v => w[v.id])
        .map(v => v.id)
        .join(',');
      grouped[courseKey] = ids; // 沒看的也存空字串，保持紀錄
    }
    callGAS({
      action: 'saveProgress',
      user: currentUser,
      data: JSON.stringify(grouped)
    }, function() {});
  }, 2500);
}

// ── THEATER (SIDE) EMBED PLAYER ──────────────
let currentTheaterVid = null;

function openTheaterPanel(vid, title, kind) {
  const split = document.getElementById('content-split');
  const main  = document.getElementById('main-content');
  const wrap  = document.getElementById('theater-wrap');
  const panel = document.getElementById('theater-panel');
  const label = document.getElementById('theater-title');

  split.classList.add('is-theater');
  main.classList.add('theater-mode');
  wrap.classList.add('active');
  panel.classList.remove('is-pdf', 'is-page', 'is-text');
  if (kind) panel.classList.add('is-' + kind);
  label.textContent = title || '';

  if (currentTheaterVid) {
    const prevBtn = document.getElementById('vb-' + currentTheaterVid);
    if (prevBtn) prevBtn.classList.remove('playing');
  }
  currentTheaterVid = vid;
  const btn = document.getElementById('vb-' + vid);
  if (btn) btn.classList.add('playing');

  wrap.scrollIntoView({ behavior:'smooth', block:'nearest' });
  return panel;
}

function toggleEmbed(vid, url, title, kind) {
  if (currentTheaterVid === vid) { closeTheater(); return; }
  const panel = openTheaterPanel(vid, title, kind === 'pdf' || kind === 'page' ? kind : null);
  panel.innerHTML = `<iframe src="${url}" allow="autoplay; fullscreen" allowfullscreen loading="lazy"></iframe>`;
}

function toggleNote(vid, title, content) {
  if (currentTheaterVid === vid) { closeTheater(); return; }
  const panel = openTheaterPanel(vid, title, 'text');
  panel.textContent = content;
}

function closeTheater() {
  const split = document.getElementById('content-split');
  const main  = document.getElementById('main-content');
  const wrap  = document.getElementById('theater-wrap');
  const panel = document.getElementById('theater-panel');

  split.classList.remove('is-theater');
  main.classList.remove('theater-mode');
  wrap.classList.remove('active');
  panel.innerHTML = '';

  if (currentTheaterVid) {
    const btn = document.getElementById('vb-' + currentTheaterVid);
    if (btn) btn.classList.remove('playing');
  }
  currentTheaterVid = null;
}

function toggleWatched(vid) {
  const w = getWatched();
  w[vid] = !w[vid];
  localStorage.setItem(watchedKey(), JSON.stringify(w));
  const row = document.getElementById('vr-' + vid);
  if (row) row.className = 'video-row' + (w[vid] ? ' watched' : '');
  updateProgressBar(vid, w);
  scheduleCloudSave();
}
function updateProgressBar(vid, w) {
  for (const [key, data] of Object.entries(COURSES)) {
    if (!isAllowed(key)) continue;
    for (const ch of data.chapters) {
      if (ch.videos.some(v => v.id === vid)) {
        const all  = data.chapters.flatMap(c => c.videos);
        const done = all.filter(v => w[v.id]).length;
        const pct  = Math.round(done / all.length * 100);
        const fill = document.getElementById('pf-' + key.replace(/\|/g,'-'));
        const lbl  = document.getElementById('pl-' + key.replace(/\|/g,'-'));
        if (fill) fill.style.width = pct + '%';
        if (lbl)  lbl.textContent  = `${done} / ${all.length} 支（${pct}%）`;
        return;
      }
    }
  }
}

// ── LEVEL / GRADE ────────────────────────────
function setLevel(lv) {
  closeTheater();
  currentLevel = lv; openSubject = null; openSem = null;
  document.getElementById('tab-elem').classList.toggle('active',  lv === 'elem');
  document.getElementById('tab-jh').classList.toggle('active',    lv === 'jh');
  document.getElementById('tab-extra').classList.toggle('active', lv === 'extra');
  currentGrade = GRADES.find(g => g.level === lv).id;
  document.getElementById('grade-bar').style.display = lv === 'extra' ? 'none' : '';
  renderGrades();
  renderSubjects();
}
function setGrade(gid) {
  closeTheater();
  currentGrade = gid; openSubject = null; openSem = null;
  document.querySelectorAll('.grade-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.gid === gid));
  renderSubjects();
}

// ── RENDER GRADES ────────────────────────────
function renderGrades() {
  document.getElementById('grade-bar').innerHTML =
    GRADES.filter(g => g.level === currentLevel).map(g =>
      `<button class="grade-btn${g.id === currentGrade ? ' active' : ''}"
               data-gid="${g.id}" onclick="setGrade('${g.id}')">${g.label}</button>`
    ).join('');
}

// ── RENDER SUBJECTS ──────────────────────────
function renderSubjects() {
  const grade = GRADES.find(g => g.id === currentGrade);
  document.getElementById('section-title').textContent = `${grade.full} ・ 考科課程`;

  document.getElementById('subject-grid').innerHTML = grade.subs.map(sub => {
    const cfg    = SUB_CFG[sub] || { icon:'📚', c:'#4a5568', bg:'#f7fafc' };
    const upKey  = `${currentGrade}|${sub}|上`;
    const dnKey  = `${currentGrade}|${sub}|下`;
    const upData = courseFor(upKey);
    const dnData = courseFor(dnKey);

    const badges = currentGrade === 'X1'
      ? (() => {
          const d   = upData || dnData;
          const cnt = d ? d.chapters.reduce((s,c) => s + c.videos.length, 0) : 0;
          return `<span class="sem-badge ${d ? 'has' : 'none'}">${d ? `共 ${cnt} 支` : '尚未加入'}</span>`;
        })()
      : ['上','下'].map(sem => {
          const d   = sem === '上' ? upData : dnData;
          const cnt = d ? d.chapters.reduce((s,c) => s + c.videos.length, 0) : 0;
          return `<span class="sem-badge ${d ? 'has' : 'none'}">
            ${sem}學期${d ? ` · ${cnt}支` : ''}
          </span>`;
        }).join('');

    const isOpen = openSubject === sub;
    return `
      <div class="subject-card" style="border-color:${cfg.c}40"
           id="sc-${currentGrade}-${sub}">
        <div class="subject-hdr"
             onclick="toggleSubject('${currentGrade}','${sub}','${cfg.c}')">
          <div class="subject-icon" style="background:${cfg.bg}">${cfg.icon}</div>
          <div class="subject-info">
            <div class="subject-name" style="color:${cfg.c}">${sub}</div>
            <div class="subject-badges">${badges}</div>
          </div>
          <span class="subject-arrow${isOpen ? ' open' : ''}"
                id="sa-${currentGrade}-${sub}">▼</span>
        </div>
        <div class="subject-body${isOpen ? ' open' : ''}"
             id="sb-${currentGrade}-${sub}">
          ${isOpen ? buildSubjectBody(currentGrade, sub) : ''}
        </div>
      </div>`;
  }).join('');
}

// ── TOGGLE SUBJECT ───────────────────────────
function toggleSubject(gid, sub) {
  closeTheater();
  if (openSubject === sub) {
    openSubject = null; openSem = null;
  } else {
    openSubject = sub;
    openSem = courseFor(`${gid}|${sub}|上`) ? '上' : '下';
  }
  const body  = document.getElementById(`sb-${gid}-${sub}`);
  const arrow = document.getElementById(`sa-${gid}-${sub}`);
  if (openSubject === sub) {
    body.innerHTML = buildSubjectBody(gid, sub);
    body.classList.add('open');
    arrow.classList.add('open');
  } else {
    body.classList.remove('open');
    arrow.classList.remove('open');
  }
}

// ── BUILD SUBJECT BODY ───────────────────────
function buildSubjectBody(gid, sub) {
  const upData = courseFor(`${gid}|${sub}|上`);
  const dnData = courseFor(`${gid}|${sub}|下`);
  if (!upData && !dnData)
    return `<div class="empty-state">
      <div class="empty-icon">📭</div>
      <p>尚未加入課程</p>
      <p class="hint">購買課程後請告知家長新增</p>
    </div>`;

  // 不分年級的加映課程：不分學期，直接顯示內容，不出現學期分頁
  if (gid === 'X1') {
    return buildSemContent(gid, sub, '上', upData || dnData);
  }

  const sems = [
    { key:'上', data: upData },
    { key:'下', data: dnData },
  ].filter(s => s.data);
  if (!openSem || !sems.find(s => s.key === openSem)) openSem = sems[0].key;
  const curData = courseFor(`${gid}|${sub}|${openSem}`);

  const tabs = sems.map(s =>
    `<button class="sem-tab${s.key === openSem ? ' active' : ''}"
             onclick="setSem('${gid}','${sub}','${s.key}')">${s.key}學期</button>`
  ).join('');

  return `<div class="sem-tabs">${tabs}</div>${buildSemContent(gid, sub, openSem, curData)}`;
}

// ── SET SEMESTER ─────────────────────────────
function setSem(gid, sub, sem) {
  closeTheater();
  openSem = sem;
  const body = document.getElementById(`sb-${gid}-${sub}`);
  if (body) body.innerHTML = buildSubjectBody(gid, sub);
}

// ── BUILD SEM CONTENT ────────────────────────
function buildSemContent(gid, sub, sem, data) {
  if (!data)
    return `<div class="empty-state">
      <div class="empty-icon">📭</div><p>尚未加入課程</p>
    </div>`;

  const w   = getWatched();
  const all = data.chapters.flatMap(c => c.videos);
  const done= all.filter(v => w[v.id]).length;
  const pct = all.length ? Math.round(done / all.length * 100) : 0;
  const pid = `${gid}-${sub}-${sem}`;

  const teacherHtml = data.teacher ? `
    <div style="padding:8px 14px;background:#f7fafc;border-bottom:1px solid #e2e8f0;
                font-size:12px;color:#718096;">
      👨‍🏫 授課老師：<strong style="color:#2b6cb0">${data.teacher}</strong>
    </div>` : '';

  const bonusHtml = data.bonus ? `
    <div class="bonus-bar">
      <div class="bonus-bar-title">🌟 延伸學習資源</div>
      <div class="bonus-links">
        ${data.bonus.map(b =>
          `<a href="${b.url}" target="_blank" class="bonus-link">▶ ${b.label}</a>`
        ).join('')}
      </div>
    </div>` : '';

  const chapters = data.chapters.map(ch => {
    const totalMins = ch.videos.reduce((s,v)=>s+v.mins,0);
    const wCnt      = ch.videos.filter(v=>w[v.id]).length;
    const videos    = ch.videos.map(v => {
      const escTitle  = (v.title||'').replace(/'/g,"\\'");
      let playBtn;
      if (v.noteText) {
        const escNote = v.noteText.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n');
        playBtn = `<button type="button" class="v-btn" id="vb-${v.id}"
                     onclick="toggleNote('${v.id}','${escTitle}','${escNote}')">📋 查看</button>`;
      } else {
        const embedUrl  = v.embed === false ? null : toEmbedUrl(v.url);
        const embedKind = embedUrl && embedUrl.startsWith('assets/') ? 'page' : (v.isPdf ? 'pdf' : 'video');
        const isDoc     = embedKind === 'pdf' || embedKind === 'page';
        playBtn = embedUrl
          ? `<button type="button" class="v-btn${v.isExam?' exam-btn':''}" id="vb-${v.id}"
                     onclick="toggleEmbed('${v.id}','${embedUrl}','${escTitle}','${embedKind}')">${isDoc ? '📄 開啟' : '▶ 播放'}</button>`
          : `<a href="${v.url}" target="_blank"
                class="v-btn${v.isExam?' exam-btn':''}">▶ 觀看</a>`;
      }
      return `
      <div class="video-row${w[v.id]?' watched':''}" id="vr-${v.id}">
        <span class="v-num">${v.id}</span>
        <span class="v-title${v.isExam?' exam':''}">
          ${v.isExam ? '📝 ' : ''}${v.title}
        </span>
        <span class="v-dur">${fmtMins(v.mins)}</span>
        ${playBtn}
        <input type="checkbox" class="v-check" title="標記已看"
               ${w[v.id]?'checked':''} onchange="toggleWatched('${v.id}')">
      </div>`;
    }).join('');
    return `
      <div class="chapter-block">
        <div class="chapter-hdr" onclick="toggleCh(this)">
          <span class="ch-tag">${ch.id}</span>
          <span class="ch-title">${ch.title}</span>
          <span class="ch-meta">${ch.videos.length}支 · ${fmtMins(totalMins)}${wCnt?` · ✓${wCnt}`:''}</span>
          <span class="ch-arrow open">▼</span>
        </div>
        <div class="chapter-videos open">${videos}</div>
      </div>`;
  }).join('');

  return `
    ${teacherHtml}
    ${bonusHtml}
    <div class="progress-wrap">
      <div class="progress-labels">
        <span>學習進度</span>
        <span id="pl-${pid}">${done} / ${all.length} 支（${pct}%）</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="pf-${pid}" style="width:${pct}%"></div>
      </div>
    </div>
    ${chapters}`;
}

// ── TOGGLE CHAPTER ───────────────────────────
function toggleCh(hdr) {
  const body = hdr.nextElementSibling;
  const arr  = hdr.querySelector('.ch-arrow');
  const open = body.classList.toggle('open');
  arr.classList.toggle('open', open);
}

// ── HELPERS ──────────────────────────────────
// 把 YouTube / Drive 連結轉成可內嵌播放的網址；其他網址（如本機頁面）回傳 null，維持另開分頁
function toEmbedUrl(url) {
  const yt = url.match(/youtu\.be\/([A-Za-z0-9_-]+)/) || url.match(/youtube\.com\/watch\?v=([A-Za-z0-9_-]+)/);
  if (yt) return `https://www.youtube.com/embed/${yt[1]}`;
  if (url.includes('drive.google.com')) return url;
  if (url.startsWith('assets/')) return url;
  return null;
}

function fmtMins(m) {
  if (m < 60) return m + '分';
  return Math.floor(m/60) + '時' + (m % 60 ? (m % 60) + '分' : '');
}

// ── INIT ─────────────────────────────────────
function initApp() {
  const savedGrade = sessionStorage.getItem('lms_grade') || 'G8';
  const grade = GRADES.find(g => g.id === savedGrade) || GRADES[2];
  setLevel(grade.level);
  setGrade(grade.id);
}

document.getElementById('pw').addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});

const _savedUser = sessionStorage.getItem(SESS_KEY);
if (_savedUser) {
  currentUser = _savedUser;
  setAllowedFromString(sessionStorage.getItem(ALLOWED_KEY));
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('user-label').textContent = '👤 ' + _savedUser;
  initApp();
}
</script>
